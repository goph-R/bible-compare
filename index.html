<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bible Compare</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <div id="loading-text">Loading...</div>
  </div>

  <!-- Header / Navigation -->
  <header class="app-header">
    <div class="app-title">Bible Compare</div>
    <div class="nav-controls">
      <div class="version-picker">
        <button id="version-btn" class="version-btn" aria-label="Select versions">&#x1F4D6;</button>
        <div id="version-popup" class="version-popup hidden">
          <div id="version-list" class="version-list"></div>
          <button id="version-close" class="version-close">Close</button>
        </div>
      </div>
    </div>
    <button id="theme-btn" class="theme-btn" aria-label="Toggle theme"></button>
    <button id="bookmarks-btn" class="bookmarks-btn" aria-label="Bookmarks">&#x1F516;</button>
    <button id="search-btn" class="search-btn" aria-label="Search">&#x1F50D;</button>
  </header>

  <!-- Book / Chapter / Verse selectors -->
  <div class="nav-selects">
    <select id="book-select" aria-label="Book"></select>
    <select id="chapter-select" aria-label="Chapter"></select>
    <select id="verse-select" aria-label="Verse"></select>
    <button id="bookmark-star" class="bookmark-star" aria-label="Toggle bookmark">&#x2606;</button>
  </div>

  <!-- Translation Tabs -->
  <nav id="tab-bar" class="tab-bar"></nav>

  <!-- Content Panel (single translation at a time) -->
  <main id="content-panel" class="content-panel">
    <p class="empty-message">Loading...</p>
  </main>

  <!-- Paging Buttons -->
  <footer class="paging-bar">
    <button id="prev-btn" class="paging-btn">&larr; Previous</button>
    <span id="paging-label" class="paging-label"></span>
    <button id="next-btn" class="paging-btn">Next &rarr;</button>
  </footer>

  <!-- Bookmarks Overlay -->
  <div id="bookmarks-overlay" class="bookmarks-overlay hidden">
    <div class="bookmarks-container">
      <div class="bookmarks-header">
        <h2 id="bookmarks-title" class="bookmarks-title">Bookmarks</h2>
        <button id="bookmarks-close-btn" class="search-close-btn">&times;</button>
      </div>
      <div id="bookmarks-list" class="bookmarks-list"></div>
    </div>
  </div>

  <!-- Search Overlay -->
  <div id="search-overlay" class="search-overlay hidden">
    <div class="search-container">
      <div class="search-header">
        <input type="text" id="search-input" class="search-input" placeholder="Search..." autocomplete="off">
        <button id="search-go" class="search-go-btn">&#x1F50D;</button>
        <button id="search-close-btn" class="search-close-btn">&times;</button>
      </div>
      <div id="search-status" class="search-status"></div>
      <div id="search-results" class="search-results"></div>
      <div id="search-paging" class="search-paging hidden">
        <button id="search-prev" class="paging-btn">&larr; Previous</button>
        <span id="search-paging-label" class="paging-label"></span>
        <button id="search-next" class="paging-btn">Next &rarr;</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
